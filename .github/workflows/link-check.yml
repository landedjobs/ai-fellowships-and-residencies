name: Link check

on:
  workflow_dispatch:
  push:
    paths:
      - "README.md"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "17 6 * * 1"
  pull_request:
    paths:
      - "README.md"

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check public program links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-redirects 10
            --exclude '^https://x\.com/'
            README.md
